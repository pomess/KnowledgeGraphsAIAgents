<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            width: 40%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-right: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            overflow-y: auto;
        }

        .right-panel {
            flex: 1;
            position: relative;
            background: #020617;
            overflow: hidden;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Scanner Effect */
        .scanner-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.05), transparent);
            transform: skewX(-20deg);
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        .scanning .scanner-line {
            display: block;
            animation: scan 2.5s infinite linear;
        }

        @keyframes scan {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }

        #cy.visible {
            opacity: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-color);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .file-upload {
            position: relative;
            display: inline-block;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-label {
            display: block;
            padding: 1rem;
            background: var(--glass-bg);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--secondary-text);
        }

        .custom-file-label:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.05);
        }

        button {
            padding: 1rem;
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            opacity: 0;
            visibility: hidden;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Futuristic Graph Loade Animation */
        .graph-loader {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 2rem;
        }

        .hub-node {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: var(--accent-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--accent-color);
            animation: pulse-hub 2s infinite ease-in-out;
            z-index: 2;
        }

        .sat-node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #818cf8;
            border-radius: 50%;
            box-shadow: 0 0 10px #818cf8;
            z-index: 2;
        }

        .sat-node:nth-child(2) {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            animation: float-1 3s infinite ease-in-out;
        }

        .sat-node:nth-child(3) {
            bottom: 0;
            right: 0;
            animation: float-2 3s infinite ease-in-out 0.5s;
        }

        .sat-node:nth-child(4) {
            bottom: 0;
            left: 0;
            animation: float-3 3s infinite ease-in-out 1s;
        }

        .connector {
            position: absolute;
            top: 50%;
            left: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-color), transparent);
            transform-origin: 0 50%;
            z-index: 1;
            opacity: 0;
            animation: draw-line 3s infinite ease-in-out;
        }

        .connector:nth-child(5) {
            width: 50px;
            transform: rotate(-90deg);
            animation-delay: 0s;
        }

        .connector:nth-child(6) {
            width: 60px;
            transform: rotate(30deg);
            animation-delay: 0.5s;
        }

        .connector:nth-child(7) {
            width: 60px;
            transform: rotate(150deg);
            animation-delay: 1s;
        }

        .loader-text {
            color: var(--accent-color);
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
            animation: fade-text 2s infinite ease-in-out;
        }

        @keyframes pulse-hub {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 20px var(--accent-color);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                box-shadow: 0 0 40px var(--accent-color);
            }
        }

        @keyframes float-1 {

            0%,
            100% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, -10px);
            }
        }

        @keyframes float-2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(10px, 10px);
            }
        }

        @keyframes float-3 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-10px, 10px);
            }
        }

        @keyframes draw-line {
            0% {
                width: 0;
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes fade-text {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* Chatbot Style */
        .chatbot-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 400px;
            position: relative;
        }

        .chat-header {
            position: relative;
            z-index: 2;
            padding: 0.75rem 1rem;
            background: rgba(56, 189, 248, 0.1);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            position: relative;
            z-index: 2;
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-color);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
            display: flex;
            flex-direction: column;
        }

        /* Markdown Styling for Bot Messages */
        .message-content p {
            margin: 0 0 0.5rem 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content strong {
            color: var(--accent-color);
            font-weight: 600;
        }

        .message-content em {
            color: #a5b4fc;
            font-style: italic;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85em;
            color: #fbbf24;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.75rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .message-content li {
            margin: 0.25rem 0;
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            color: var(--accent-color);
            margin: 0.5rem 0;
            font-size: 1rem;
        }

        .message-content a {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .message-content blockquote {
            border-left: 3px solid var(--accent-color);
            padding-left: 0.75rem;
            margin: 0.5rem 0;
            color: var(--secondary-text);
            font-style: italic;
        }

        .message-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 0.5rem;
        }

        .toggle-highlight {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--accent-color);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .toggle-highlight:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: var(--accent-color);
        }

        .toggle-highlight.source-mode {
            background: rgba(132, 204, 22, 0.1);
            color: #84cc16;
            border-color: #84cc16;
        }

        .chat-input-area {
            position: relative;
            z-index: 2;
            padding: 1rem;
            display: flex;
            gap: 0.5rem;
            border-top: 1px solid var(--border-color);
        }

        #chat-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            color: var(--text-color);
            outline: none;
            font-size: 0.9rem;
        }

        #chat-input:focus {
            border-color: var(--accent-color);
        }

        #send-chat {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .highlighted-node {
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.8));
        }

        /* Pulsate Animation for nodes */
        @keyframes pulsate {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(56, 189, 248, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
            }
        }

        @keyframes bloom {

            0%,
            100% {
                box-shadow: 0 0 10px rgba(56, 189, 248, 0.2), inset 0 0 5px rgba(255, 255, 255, 0.1);
            }

            50% {
                box-shadow: 0 0 30px rgba(56, 189, 248, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.2);
            }
        }

        @property --beam-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes rotate-beam {
            from {
                --beam-angle: 0deg;
            }

            to {
                --beam-angle: 360deg;
            }
        }

        .chatbot-container.highlight-active::before {
            content: '';
            position: absolute;
            inset: -2px;
            padding: 2px;
            background: conic-gradient(from var(--beam-angle), transparent 70%, var(--accent-color) 90%, transparent 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: 1;
            animation: rotate-beam 5s linear infinite;
            pointer-events: none;
            border-radius: 14px;
        }

        /* Ambient glow for the whole container - now with hollow center */
        .chatbot-container.highlight-active::after {
            content: '';
            position: absolute;
            inset: -10px;
            padding: 10px;
            /* Defines the thickness of the glow ring */
            background: conic-gradient(from var(--beam-angle), transparent 70%, rgba(56, 189, 248, 0.3) 90%, transparent 100%);
            /* Increased opacity slightly to compensate for blur */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            filter: blur(8px);
            z-index: 0;
            animation: rotate-beam 5s linear infinite;
            pointer-events: none;
            border-radius: 22px;
        }

        .node-bloom {
            border-width: 2px !important;
            animation: bloom 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* ============================
           Execution Flow Visualization
           ============================ */
        .execution-flow-container {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .execution-flow-container.collapsed .execution-flow-content {
            max-height: 0;
            padding: 0 1rem;
            opacity: 0;
        }

        .execution-flow-container.hidden {
            display: none;
        }

        .execution-flow-header {
            padding: 0.75rem 1rem;
            background: rgba(129, 140, 248, 0.1);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .execution-flow-header:hover {
            background: rgba(129, 140, 248, 0.15);
        }

        .execution-flow-header span {
            font-size: 0.875rem;
            font-weight: 600;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .execution-flow-header .toggle-icon {
            transition: transform 0.3s;
        }

        .execution-flow-container.collapsed .toggle-icon {
            transform: rotate(180deg);
        }

        .execution-flow-content {
            padding: 1.5rem 1rem;
            max-height: 200px;
            overflow-x: auto;
            overflow-y: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
            opacity: 1;
            /* Hide scrollbar */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .execution-flow-content::-webkit-scrollbar {
            display: none;
        }

        .execution-flow-pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            min-width: max-content;
        }

        .execution-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 85px;
            height: 65px;
            padding: 0.5rem 0.75rem;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .execution-node .node-icon {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }

        .execution-node .node-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            text-align: center;
            white-space: nowrap;
        }

        .execution-node .node-details {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 0.15rem;
            text-align: center;
        }

        .execution-node .node-duration {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #64748b;
            white-space: nowrap;
        }

        /* Node States */
        .execution-node.pending {
            opacity: 0.5;
            border-color: #334155;
        }

        .execution-node.running {
            border-color: #0ea5e9;
            background: linear-gradient(135deg, #0c4a6e 0%, #1e293b 100%);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            animation: nodeRunning 1.5s infinite;
        }

        @keyframes nodeRunning {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(14, 165, 233, 0.6);
            }
        }

        .execution-node.running .node-label {
            color: #38bdf8;
        }

        .execution-node.completed {
            border-color: #10b981;
            background: linear-gradient(135deg, #064e3b 0%, #1e293b 100%);
            opacity: 1;
        }

        .execution-node.completed .node-label {
            color: #34d399;
        }

        .execution-node.completed .node-duration {
            color: #34d399;
        }

        .execution-node.error {
            border-color: #ef4444;
            background: linear-gradient(135deg, #450a0a 0%, #1e293b 100%);
        }

        .execution-node.error .node-label {
            color: #f87171;
        }

        /* Edge connector between nodes */
        .execution-edge {
            width: 30px;
            height: 2px;
            background: #334155;
            position: relative;
            flex-shrink: 0;
        }

        .execution-edge::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 6px solid #334155;
            transition: border-left-color 0.3s;
        }

        .execution-edge.active {
            background: linear-gradient(90deg, #10b981, #0ea5e9);
            animation: flowPulse 1s infinite;
        }

        .execution-edge.active::after {
            border-left-color: #0ea5e9;
        }

        .execution-edge.completed {
            background: #10b981;
        }

        .execution-edge.completed::after {
            border-left-color: #10b981;
        }

        @keyframes flowPulse {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        /* Animated data flow dots */
        .execution-edge.active::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 6px;
            height: 6px;
            background: #38bdf8;
            border-radius: 50%;
            transform: translateY(-50%);
            animation: flowDot 0.8s infinite linear;
        }

        @keyframes flowDot {
            0% {
                left: 0;
                opacity: 1;
            }

            100% {
                left: calc(100% - 6px);
                opacity: 0.5;
            }
        }

        /* Total execution time */
        .execution-total-time {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: auto;
            padding-left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .execution-total-time.completed {
            color: #34d399;
        }
    </style>
</head>

<body>
    <header>
        <h1>Knowledge Graph Creator</h1>

    </header>

    <main>
        <section class="left-panel">
            <div class="input-group">
                <label for="text-input">Plain Text</label>
                <textarea id="text-input"
                    placeholder="Type or paste your text here (e.g., 'Alice lives in Paris. She works for the Sorbonne.')"></textarea>
            </div>

            <div class="input-group">
                <label>Upload Documents</label>
                <div class="file-upload">
                    <label for="file-input" class="custom-file-label" id="file-label">
                        📁 Click to upload .txt files
                    </label>
                    <input type="file" id="file-input" multiple accept=".txt">
                </div>
            </div>

            <button id="generate-btn">Generate Graph</button>
            <div id="error-message" style="color: #ef4444; font-size: 0.875rem; text-align: center; display: none;">
            </div>

            <!-- Execution Flow Visualization -->
            <div id="execution-flow" class="execution-flow-container hidden">
                <div class="execution-flow-header" onclick="toggleExecutionFlow()">
                    <span>⚡ Execution Pipeline</span>
                    <span class="toggle-icon">▲</span>
                </div>
                <div class="execution-flow-content">
                    <div id="execution-pipeline" class="execution-flow-pipeline">
                        <!-- Nodes will be dynamically inserted here -->
                    </div>
                </div>
            </div>

            <div class="chatbot-container">
                <div class="chat-header">
                    <span>Knowledge Assistant</span>
                    <div id="chat-status" class="spinner" style="width: 12px; height: 12px; display: none;"></div>
                </div>
                <div id="chat-messages">
                    <div class="message bot">Hello! Generate a graph first, then you can ask me questions about it.
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Ask a question..." disabled>
                    <button id="send-chat" disabled>Send</button>
                </div>
            </div>
        </section>

        <section class="right-panel">
            <canvas id="bg-canvas"></canvas>
            <div class="scanner-line"></div>
            <div id="cy"></div>

            <!-- Futuristic Central Loader -->
            <div id="loader-overlay" class="loader-overlay">
                <div class="graph-loader">
                    <div class="hub-node"></div>
                    <div class="sat-node"></div>
                    <div class="sat-node"></div>
                    <div class="sat-node"></div>
                    <div class="connector"></div>
                    <div class="connector"></div>
                    <div class="connector"></div>
                </div>
                <div class="loader-text">Building Knowledge Graph...</div>
            </div>

            <div class="controls">
                <button class="control-btn" id="zoom-in" title="Zoom In">+</button>
                <button class="control-btn" id="zoom-out" title="Zoom Out">-</button>
                <button class="control-btn" id="fit-btn" title="Fit to Screen">⛶</button>
            </div>
        </section>
    </main>

    <script>
        let cy = null;

        function initCytoscape(elements) {
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': '#1e293b',
                            'color': '#f8fafc',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'font-size': '11px',
                            'font-weight': '600',
                            'width': '65px',
                            'height': '65px',
                            'shape': 'round-rectangle',
                            'text-outline-width': 0,
                            'border-width': 2.5,
                            'border-color': '#334155',
                            'border-opacity': 1,
                            'overlay-padding': '6px',
                            'overlay-opacity': 0,
                            'transition-property': 'background-color, border-color, border-width, width, height, opacity, text-opacity, shape',
                            'transition-duration': '0.4s'
                        }
                    },
                    {
                        selector: 'node[type="Person"]',
                        style: {
                            'shape': 'ellipse',
                            'background-color': '#064e3b',
                            'border-color': '#059669',
                            'width': '60px',
                            'height': '60px'
                        }
                    },
                    {
                        selector: 'node[type="Organization"]',
                        style: {
                            'shape': 'round-rectangle',
                            'corner-radius': 8,
                            'background-color': '#1e1b4b',
                            'border-color': '#4338ca',
                            'width': '70px',
                            'height': '70px'
                        }
                    },
                    {
                        selector: 'node[type="Location"]',
                        style: {
                            'shape': 'round-rectangle',
                            'corner-radius': 16,
                            'background-color': '#451a03',
                            'border-color': '#b45309'
                        }
                    },
                    {
                        selector: 'node[type="Document"]',
                        style: {
                            'shape': 'rectangle',
                            'background-color': '#1c1917',
                            'border-color': '#78716c'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 1,
                            'line-color': 'rgba(148, 163, 184, 0.15)',
                            'line-style': 'solid',
                            'target-arrow-color': 'rgba(148, 163, 184, 0.15)',
                            'target-arrow-shape': 'triangle',
                            'arrow-scale': 0.6,
                            'curve-style': 'bezier',
                            'control-point-step-size': 30,
                            'label': 'data(label)',
                            'font-size': '8px',
                            'font-weight': '400',
                            'color': 'rgba(148, 163, 184, 0.5)',
                            'text-rotation': 'autorotate',
                            'text-background-opacity': 0,
                            'text-margin-y': -10,
                            'transition-property': 'line-color, target-arrow-color, width, opacity',
                            'transition-duration': '0.6s'
                        }
                    },
                    {
                        selector: '.highlighted',
                        style: {
                            'background-color': '#0ea5e9',
                            'border-width': 2,
                            'border-color': '#f8fafc',
                            'width': '75px',
                            'height': '75px',
                            'font-size': '13px',
                            'z-index': 100,
                            'opacity': 1,
                            'text-opacity': 1,
                            'text-outline-color': '#0ea5e9',
                            'text-outline-width': 2,
                            'box-shadow': '0 0 15px rgba(14, 165, 233, 0.8)'
                        }
                    },
                    {
                        selector: '.dimmed',
                        style: {
                            'opacity': 0.15,
                            'text-opacity': 0,
                            'transition-duration': '0.8s'
                        }
                    },
                    {
                        selector: 'node:active',
                        style: {
                            'overlay-color': '#38bdf8',
                            'overlay-padding': '8px',
                            'overlay-opacity': 0.3
                        }
                    }
                ],
                layout: {
                    name: 'fcose',
                    animate: true,
                    animationDuration: 1000,
                    fit: true,
                    padding: 50,
                    nodeDimensionsIncludeLabels: true,
                    uniformNodeDimensions: false,
                    packComponents: true,
                    quality: 'proof'
                },
                userZoomingEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false
            });

            // Add hover effects for nodes
            cy.on('mouseover', 'node', function (e) {
                const node = e.target;
                node.animate({
                    style: {
                        'border-width': 6,
                        'width': '70px',
                        'height': '70px'
                    }
                }, { duration: 200 });

                // Dim other nodes and edges
                cy.elements().difference(node.closedNeighborhood()).addClass('faded');
            });

            cy.on('mouseout', 'node', function (e) {
                const node = e.target;
                node.animate({
                    style: {
                        'border-width': 3,
                        'width': '60px',
                        'height': '60px'
                    }
                }, { duration: 200 });

                cy.elements().removeClass('faded');
            });

            // Futuristic styling for faded elements
            cy.style().selector('.faded').style({
                'opacity': 0.2,
                'text-opacity': 0
            }).update();

            // Animated particles on edges (simulated via dashed pattern shift if possible, 
            // but Cytoscape doesn't support dashed line offset animation natively yet.
            // So we'll highlight connected edges on hover invece)
            cy.on('mouseover', 'node', function (e) {
                e.target.connectedEdges().animate({
                    style: {
                        'line-color': '#38bdf8',
                        'target-arrow-color': '#38bdf8',
                        'width': 4
                    }
                }, { duration: 200 });
            });

            cy.on('mouseout', 'node', function (e) {
                e.target.connectedEdges().animate({
                    style: {
                        'line-color': '#475569',
                        'target-arrow-color': '#475569',
                        'width': 2
                    }
                }, { duration: 200 });
            });

            cy.on('tap', 'node', function (evt) {
                const node = evt.target;
                console.log('Tapped node ' + node.id());
            });
        }

        // Handle file label update
        document.getElementById('file-input').addEventListener('change', function (e) {
            const label = document.getElementById('file-label');
            if (this.files.length > 0) {
                label.innerText = `📁 ${this.files.length} file(s) selected`;
                label.style.borderColor = '#38bdf8';
                label.style.color = '#38bdf8';
            } else {
                label.innerText = '📁 Click to upload .txt files';
                label.style.borderColor = '';
                label.style.color = '';
            }
        });

        // Controls
        document.getElementById('zoom-in').addEventListener('click', () => cy && cy.zoom(cy.zoom() * 1.2));
        document.getElementById('zoom-out').addEventListener('click', () => cy && cy.zoom(cy.zoom() / 1.2));
        document.getElementById('fit-btn').addEventListener('click', () => cy && cy.fit());

        // Generate Logic
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const text = document.getElementById('text-input').value;
            const fileInput = document.getElementById('file-input');
            const generateBtn = document.getElementById('generate-btn');
            const status = document.getElementById('status');
            const errorMsg = document.getElementById('error-message');

            if (!text && fileInput.files.length === 0) {
                errorMsg.innerText = "Please provide some text or upload a file.";
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            generateBtn.disabled = true;

            // Smoothly show loader
            document.getElementById('loader-overlay').classList.add('active');
            document.getElementById('cy').classList.remove('visible');

            const formData = new FormData();
            if (text) formData.append('text', text);
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }

            try {
                const response = await fetch('/generate-graph', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to generate graph');
                }

                const data = await response.json();

                if (data.elements.length === 0) {
                    errorMsg.innerText = data.message || "No knowledge could be extracted from the given input.";
                    errorMsg.style.display = 'block';
                } else {
                    initCytoscape(data.elements);
                    // Enable chat
                    document.getElementById('chat-input').disabled = false;
                    document.getElementById('send-chat').disabled = false;
                    addChatMessage('bot', 'Graph generated! How can I help you explore this knowledge?');

                    // Highlight chatbot perimeter with a subtle rotating beam
                    const chatbot = document.querySelector('.chatbot-container');
                    if (chatbot) {
                        chatbot.classList.add('highlight-active');
                        setTimeout(() => {
                            chatbot.classList.remove('highlight-active');
                        }, 16000); // Extended duration (16s) for slower animation
                    }
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Error: " + err.message;
                errorMsg.style.display = 'block';
            } finally {
                generateBtn.disabled = false;

                // Wait a tiny bit for the graph to be ready before fading it in
                setTimeout(() => {
                    document.getElementById('loader-overlay').classList.remove('active');
                    document.getElementById('cy').classList.add('visible');
                }, 300);
            }
        });

        // Chat Logic - Using SSE for real-time execution flow
        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            const status = document.getElementById('chat-status');
            const chatMessages = document.getElementById('chat-messages');

            if (!message) return;

            // Clear previous highlights and dims
            if (cy) {
                cy.nodes().removeClass('highlighted');
                cy.elements().removeClass('dimmed');
            }

            addChatMessage('user', message);
            input.value = '';
            status.style.display = 'block';

            // Show execution flow with pending steps
            showExecutionFlowPending();

            try {
                // Use fetch with SSE for real-time streaming
                const response = await fetch('/chat-stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to get response');
                }

                // Read the SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let resultData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Process complete SSE events (lines ending with \n\n)
                    const events = buffer.split('\n\n');
                    buffer = events.pop(); // Keep incomplete event in buffer

                    for (const event of events) {
                        if (event.startsWith('data: ')) {
                            const jsonStr = event.substring(6);
                            try {
                                const data = JSON.parse(jsonStr);

                                if (data.type === 'step') {
                                    // Update the execution flow in real-time
                                    updateStepInRealTime(data.step_id, data.status, data.duration_ms, data.details);
                                } else if (data.type === 'result') {
                                    // Store the final result
                                    resultData = data;
                                } else if (data.type === 'error') {
                                    throw new Error(data.message);
                                }
                            } catch (parseErr) {
                                console.error('Failed to parse SSE data:', parseErr);
                            }
                        }
                    }
                }

                // Process final result
                if (resultData) {
                    addChatMessage('bot', resultData.answer, resultData);

                    // Initial highlight: Explored nodes (the context retrieved)
                    if (resultData.source_nodes && resultData.source_nodes.length > 0) {
                        setTimeout(() => applyHighlights(resultData.source_nodes, '#10b981'), 100);
                    }
                }

            } catch (err) {
                console.error(err);
                addChatMessage('bot', 'Sorry, I encountered an error: ' + err.message);
                markExecutionError();
            } finally {
                status.style.display = 'none';
            }
        }

        // Update a single step in real-time from SSE
        function updateStepInRealTime(stepId, status, durationMs, details) {
            const node = document.getElementById(`exec-node-${stepId}`);
            if (!node) return;

            // Find the step index for edge management
            const stepIndex = PIPELINE_STEPS.findIndex(s => s.id === stepId);

            if (status === 'running') {
                // Mark as running
                node.classList.remove('pending', 'completed');
                node.classList.add('running');

                // Animate incoming edge
                if (stepIndex > 0) {
                    const prevEdge = document.getElementById(`exec-edge-${stepIndex - 1}`);
                    if (prevEdge) {
                        prevEdge.classList.add('active');
                    }
                }
            } else if (status === 'completed') {
                // Mark as completed
                node.classList.remove('pending', 'running');
                node.classList.add('completed');

                // Update duration
                const durationEl = node.querySelector('.node-duration');
                if (durationEl) {
                    durationEl.textContent = `${durationMs}ms`;
                }

                // Mark incoming edge as completed
                if (stepIndex > 0) {
                    const prevEdge = document.getElementById(`exec-edge-${stepIndex - 1}`);
                    if (prevEdge) {
                        prevEdge.classList.remove('active');
                        prevEdge.classList.add('completed');
                    }
                }
            }
        }

        // ============================
        // Execution Flow Visualization
        // ============================

        const PIPELINE_STEPS = [
            { id: 'reformulation', label: 'Reformulate', icon: '🔄' },
            { id: 'embedding', label: 'Embed Query', icon: '🔢' },
            { id: 'seed_search', label: 'Seed Search', icon: '🔍' },
            { id: 'beam_search', label: 'Graph Traverse', icon: '🌐' },
            { id: 'context', label: 'Build Context', icon: '📋' },
            { id: 'llm', label: 'Generate Answer', icon: '🤖' },
            { id: 'highlight', label: 'Map Sources', icon: '🎯' }
        ];

        function toggleExecutionFlow() {
            const container = document.getElementById('execution-flow');
            container.classList.toggle('collapsed');
        }

        function showExecutionFlowPending() {
            const container = document.getElementById('execution-flow');
            const pipeline = document.getElementById('execution-pipeline');

            // Show the container
            container.classList.remove('hidden');
            container.classList.remove('collapsed');

            // Build the pipeline with all steps pending
            pipeline.innerHTML = '';

            PIPELINE_STEPS.forEach((step, index) => {
                // Add node
                const node = document.createElement('div');
                node.className = 'execution-node pending';
                node.id = `exec-node-${step.id}`;
                node.innerHTML = `
                    <span class="node-icon">${step.icon}</span>
                    <span class="node-label">${step.label}</span>
                    <span class="node-duration"></span>
                `;
                pipeline.appendChild(node);

                // Add edge connector (except after last node)
                if (index < PIPELINE_STEPS.length - 1) {
                    const edge = document.createElement('div');
                    edge.className = 'execution-edge';
                    edge.id = `exec-edge-${index}`;
                    pipeline.appendChild(edge);
                }
            });

            // Real-time updates will come from SSE stream - no fake animation needed
        }

        function animateStepSequence() {
            let currentStep = 0;

            function activateNextStep() {
                if (currentStep >= PIPELINE_STEPS.length) return;

                const step = PIPELINE_STEPS[currentStep];
                const node = document.getElementById(`exec-node-${step.id}`);

                if (node && node.classList.contains('pending')) {
                    // Mark current step as running
                    node.classList.remove('pending');
                    node.classList.add('running');

                    // Animate the incoming edge
                    if (currentStep > 0) {
                        const prevEdge = document.getElementById(`exec-edge-${currentStep - 1}`);
                        if (prevEdge) {
                            prevEdge.classList.add('active');
                        }
                    }
                }

                currentStep++;

                // Continue cycling until all steps are completed by the response
                setTimeout(() => {
                    const node = document.getElementById(`exec-node-${step.id}`);
                    if (node && node.classList.contains('running')) {
                        activateNextStep();
                    }
                }, 400);
            }

            // Start the animation
            setTimeout(activateNextStep, 100);
        }

        function renderExecutionFlow(steps) {
            const container = document.getElementById('execution-flow');
            const pipeline = document.getElementById('execution-pipeline');

            // Make sure it's visible
            container.classList.remove('hidden');

            // Calculate total time
            const totalTime = steps.reduce((sum, s) => sum + s.duration_ms, 0);

            // Update each step
            steps.forEach((step, index) => {
                const node = document.getElementById(`exec-node-${step.id}`);
                if (node) {
                    // Update state
                    node.classList.remove('pending', 'running');
                    node.classList.add('completed');

                    // Update duration
                    const durationEl = node.querySelector('.node-duration');
                    if (durationEl) {
                        durationEl.textContent = `${step.duration_ms}ms`;
                    }

                    // Mark edge as completed
                    if (index > 0) {
                        const prevEdge = document.getElementById(`exec-edge-${index - 1}`);
                        if (prevEdge) {
                            prevEdge.classList.remove('active');
                            prevEdge.classList.add('completed');
                        }
                    }
                }
            });

            // Mark the last edge as completed if exists
            const lastEdgeIndex = steps.length - 2;
            if (lastEdgeIndex >= 0) {
                const lastEdge = document.getElementById(`exec-edge-${lastEdgeIndex}`);
                if (lastEdge) {
                    lastEdge.classList.remove('active');
                    lastEdge.classList.add('completed');
                }
            }
        }

        function markExecutionError() {
            // Find any running nodes and mark them as error
            const runningNodes = document.querySelectorAll('.execution-node.running');
            runningNodes.forEach(node => {
                node.classList.remove('running');
                node.classList.add('error');
            });

            // Stop active edges
            const activeEdges = document.querySelectorAll('.execution-edge.active');
            activeEdges.forEach(edge => {
                edge.classList.remove('active');
            });
        }

        function applyHighlights(nodeIds, color) {
            if (!cy) return;

            console.log("Applying highlights to:", nodeIds);

            // 1. Reset everything to standard first
            cy.elements().removeClass('dimmed').removeClass('highlighted').removeClass('node-bloom').removeStyle();

            // 2. Find matching nodes
            const highlightNodes = cy.nodes().filter(n => nodeIds.includes(n.id()));

            if (highlightNodes.length > 0) {
                // 3. Mark everything as dimmed
                cy.elements().addClass('dimmed');

                // 4. Highlight target nodes with an elegant glow
                const isExplored = (color === '#10b981');
                const glowColor = isExplored ? 'rgba(16, 185, 129, 0.4)' : 'rgba(14, 165, 233, 0.4)';
                const borderColor = isExplored ? '#34d399' : '#38bdf8';
                const bgColor = isExplored ? '#064e3b' : '#0c4a6e';

                highlightNodes.addClass('highlighted').removeClass('dimmed').style({
                    'opacity': 1,
                    'text-opacity': 1,
                    'border-color': borderColor,
                    'border-width': 3,
                    'background-color': bgColor,
                    'width': '85px',
                    'height': '85px',
                    'z-index': 999,
                    'text-outline-color': bgColor,
                    'text-outline-width': 2
                });

                // 5. Highlight connections between keywords with a soft pulse
                const internalEdges = highlightNodes.edgesWith(highlightNodes);
                internalEdges.removeClass('dimmed').style({
                    'opacity': 0.8,
                    'width': 3,
                    'line-color': borderColor,
                    'target-arrow-color': borderColor,
                    'line-style': 'dashed',
                    'line-dash-pattern': [6, 3],
                    'z-index': 998
                });

                // 6. Cinematic Zoom & Pan
                cy.animate({
                    fit: {
                        eles: highlightNodes,
                        padding: 100
                    },
                    duration: 1200,
                    easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
                });

                // 7. Subtle Blooming pulse
                setTimeout(() => {
                    highlightNodes.addClass('node-bloom');
                }, 800);
            } else {
                console.warn("No matching nodes found in graph for IDs:", nodeIds);
                cy.fit(null, 50);
            }
        }

        function addChatMessage(role, text, data = null) {
            const chatMessages = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const content = document.createElement('div');
            content.className = 'message-content';

            // Use Markdown rendering for bot messages
            if (role === 'bot') {
                content.innerHTML = marked.parse(text);
            } else {
                content.innerText = text;
            }
            div.appendChild(content);

            if (role === 'bot' && data && (data.highlight_nodes?.length || data.source_nodes?.length)) {
                const actions = document.createElement('div');
                actions.className = 'message-actions';

                const toggle = document.createElement('button');
                toggle.className = 'toggle-highlight';
                toggle.innerText = 'Explored'; // Start with Explored
                toggle.title = 'Switch between Explored Nodes and Source Context';

                let mode = 'explored';
                toggle.onclick = () => {
                    if (mode === 'explored') {
                        mode = 'source';
                        toggle.innerText = 'Sources';
                        toggle.classList.add('source-mode');
                        // Sources Mode: Show nodes mentioned in the answer
                        applyHighlights(data.highlight_nodes || [], '#0ea5e9');
                    } else {
                        mode = 'explored';
                        toggle.innerText = 'Explored';
                        toggle.classList.remove('source-mode');
                        // Explored Mode: Show context nodes retrieved
                        applyHighlights(data.source_nodes || [], '#10b981');
                    }
                };

                actions.appendChild(toggle);
                div.appendChild(actions);
            }

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        document.getElementById('send-chat').addEventListener('click', sendChatMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // Initialize empty graph
        initCytoscape([]);

        // --- Background Particles Animation ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            // Draw lines between close particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.1 * (1 - dist / 100)})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // --- UI Feedback Updates ---
        const originalSendChat = sendChatMessage;
        sendChatMessage = async () => {
            document.querySelector('.right-panel').classList.add('scanning');
            await originalSendChat();
            setTimeout(() => {
                document.querySelector('.right-panel').classList.remove('scanning');
            }, 500);
        };
    </script>
</body>

</html>
